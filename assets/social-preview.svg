<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Quick TOTP — secure TOTP codes in your GNOME top panel">
  <title>Quick TOTP</title>
  <defs>
    <linearGradient id="qt-hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a5fb4"/>
      <stop offset="0.5" stop-color="#2c6fd0"/>
      <stop offset="1" stop-color="#1c3f7a"/>
    </linearGradient>
    <linearGradient id="qt-mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#62a0ea"/>
      <stop offset="0.55" stop-color="#3584e4"/>
      <stop offset="1" stop-color="#1a5fb4"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#qt-hero)"/>

  <!-- Decorative faint countdown rings -->
  <g fill="none" stroke="#ffffff" opacity="0.06">
    <circle cx="1120" cy="150" r="260" stroke-width="34"/>
    <circle cx="180" cy="560" r="180" stroke-width="26"/>
  </g>

  <!-- Mark -->
  <g transform="translate(550 96)">
    <rect x="0" y="0" width="180" height="180" rx="42" fill="url(#qt-mark)"/>
    <path d="M90 39.4 A50.6 50.6 0 1 1 46.15 64.7" fill="none" stroke="#ffffff"
          stroke-width="11.3" stroke-linecap="round" opacity="0.96"/>
    <circle cx="90" cy="39.4" r="7.7" fill="#2ec27e"/>
    <path d="M70.3 90 L84.4 104.1 L112.5 70.3" fill="none" stroke="#ffffff"
          stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="640" y="400" text-anchor="middle"
        font-family="Cantarell, 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="104" fill="#ffffff">
    <tspan font-weight="300">Quick</tspan><tspan font-weight="700" dx="16">TOTP</tspan>
  </text>

  <!-- Tagline -->
  <text x="640" y="462" text-anchor="middle"
        font-family="Cantarell, 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="34" font-weight="400" fill="#ffffff" opacity="0.92">
    Secure TOTP codes, right from your GNOME top panel
  </text>

  <!-- Footer -->
  <text x="640" y="520" text-anchor="middle"
        font-family="Cantarell, 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="24" font-weight="500" fill="#ffffff" opacity="0.7"
        letter-spacing="2">
    ACTIVELY MAINTAINED  ·  GPL-3.0  ·  GNOME SHELL 45–50
  </text>
</svg>
