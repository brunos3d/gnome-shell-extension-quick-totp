<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Quick TOTP icon">
  <title>Quick TOTP</title>
  <defs>
    <linearGradient id="qt-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#62a0ea"/>
      <stop offset="0.55" stop-color="#3584e4"/>
      <stop offset="1" stop-color="#1a5fb4"/>
    </linearGradient>
  </defs>

  <!-- App-icon rounded square, GNOME blue -->
  <rect x="0" y="0" width="128" height="128" rx="30" fill="url(#qt-bg)"/>

  <!-- Countdown ring: time-based one-time password -->
  <path d="M64 28 A36 36 0 1 1 32.82 46" fill="none" stroke="#ffffff"
        stroke-width="8" stroke-linecap="round" opacity="0.96"/>

  <!-- "Live" progress head, echoing the extension's green countdown state -->
  <circle cx="64" cy="28" r="5.5" fill="#2ec27e"/>

  <!-- Checkmark: authenticated / verified -->
  <path d="M50 64 L60 74 L80 50" fill="none" stroke="#ffffff"
        stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
